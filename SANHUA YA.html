<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PARTE X PARTE — Repuestos HVAC/R</title>
  <meta name="description" content="Encontrá el repuesto original exacto para tu equipo de refrigeración o aire acondicionado. Buscá por marca, equipo o aplicación y pedí tu cotización al instante." />
  <link rel="icon" type="image/png" href="assets/app-icon-192.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f2236" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="PARTE X PARTE" />
  <link rel="apple-touch-icon" href="assets/app-icon-180.png" />
  <meta property="og:title" content="PARTE X PARTE — Repuestos HVAC/R · Argentina" />
  <meta property="og:description" content="Buscá por marca, equipo o aplicación y cotizá repuestos Sanhua al instante." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/sanhua-anuncio.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="image-slot.js"></script>
  <script src="ac-images.js"></script>
  <script src="catalogo.js"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="diagrama.jsx"></script>
  <script type="text/babel" src="kits.jsx"></script>
  <script type="text/babel" src="ai-diagnostico.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "tema": "Claro",
      "acento": "#1763ad",
      "bordes": "Suave"
    }/*EDITMODE-END*/;

    const ACENTOS = ["#ef741b", "#1763ad", "#129b9b", "#e0473b"];
    const RADIOS = { "Recto": "6px", "Suave": "16px", "Redondo": "22px" };

    function Root() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        const r = document.documentElement;
        r.setAttribute("data-theme", t.tema === "Oscuro" ? "dark" : "light");
        r.style.setProperty("--accent", t.acento);
        // derivar un naranja un poco más oscuro para hover del botón wpp
        r.style.setProperty("--orange", t.acento);
        r.style.setProperty("--radius", RADIOS[t.bordes] || "16px");
        r.style.setProperty("--radius-sm", t.bordes === "Recto" ? "5px" : t.bordes === "Redondo" ? "16px" : "11px");
      }, [t.tema, t.acento, t.bordes]);

      return (
        <React.Fragment>
          <App />
          <TweaksPanel title="Tweaks">
            <TweakSection label="Apariencia" />
            <TweakRadio label="Tema" value={t.tema} options={["Claro", "Oscuro"]}
              onChange={(v) => setTweak("tema", v)} />
            <TweakColor label="Color de acento" value={t.acento} options={ACENTOS}
              onChange={(v) => setTweak("acento", v)} />
            <TweakRadio label="Bordes" value={t.bordes} options={["Recto", "Suave", "Redondo"]}
              onChange={(v) => setTweak("bordes", v)} />
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>

  <script>
  /* PWA: service worker + banner de instalación */
  (function () {
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
    var DISMISS_KEY = 'pxp-install-dismissed';
    var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    if (standalone || localStorage.getItem(DISMISS_KEY) === '1') return;

    var deferred = null;
    var ua = navigator.userAgent;
    var isIOS = /iphone|ipad|ipod/i.test(ua) && !window.MSStream;
    var isiOSSafari = isIOS && /safari/i.test(ua) && !/crios|fxios/i.test(ua);

    function close(bar, remember) {
      bar.classList.remove('show');
      if (remember) localStorage.setItem(DISMISS_KEY, '1');
      setTimeout(function () { bar.remove(); }, 300);
    }
    function showBanner(mode) {
      if (document.getElementById('pxp-install')) return;
      var bar = document.createElement('div');
      bar.id = 'pxp-install';
      bar.className = 'pxp-install';
      var msg = mode === 'ios'
        ? 'Instalá la app: tocá <b>Compartir</b> y luego <b>Agregar a inicio</b>.'
        : 'Instalá <b>PARTE X PARTE</b> para tenerla a mano en obra.';
      bar.innerHTML =
        '<img class="pxp-install-ico" src="assets/app-icon-192.png" alt="" />' +
        '<div class="pxp-install-txt">' + msg + '</div>' +
        (mode === 'ios' ? '' : '<button class="pxp-install-btn" id="pxp-install-go">Instalar</button>') +
        '<button class="pxp-install-x" id="pxp-install-x" aria-label="Cerrar">\u2715</button>';
      document.body.appendChild(bar);
      requestAnimationFrame(function () { bar.classList.add('show'); });
      document.getElementById('pxp-install-x').onclick = function () { close(bar, true); };
      var go = document.getElementById('pxp-install-go');
      if (go) go.onclick = function () {
        if (!deferred) return;
        deferred.prompt();
        deferred.userChoice.finally(function () { deferred = null; close(bar, false); });
      };
    }
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault(); deferred = e; showBanner('prompt');
    });
    window.addEventListener('appinstalled', function () {
      localStorage.setItem(DISMISS_KEY, '1');
      var b = document.getElementById('pxp-install'); if (b) b.remove();
    });
    if (isiOSSafari) setTimeout(function () { showBanner('ios'); }, 2500);
  })();
  </script>
</body>
</html>
